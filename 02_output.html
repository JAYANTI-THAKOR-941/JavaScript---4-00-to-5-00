<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output method in JavaScript</title>
</head>
<body>
    
    <h2 id="title"></h2>

    <script>

        confirm("Are you sure ? want to delete this product.!!")

        prompt("Enter your name:")

    </script>
</body>
</html>
