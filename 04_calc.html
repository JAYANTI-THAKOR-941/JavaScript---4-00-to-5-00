<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable in JavaScirpt</title>
</head>
<body>
    <input type="number" id="num1" placeholder="Enter num1">
    <input type="number" id="num2" placeholder="Enter num2">
    <button onclick="addition()">+</button>
    <h2 id="ans"></h2>

    <script>
            function addition(){
                let num1 = document.getElementById('num1').value;
                let num2 = document.getElementById('num2').value;
                let ans =parseInt(num1) + parseInt(num2);
                document.getElementById('ans').innerHTML = "Answer is : "+ans;
            }
    </script>
</body>
</html>
