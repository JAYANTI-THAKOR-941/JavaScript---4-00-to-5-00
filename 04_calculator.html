<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator in JavaScirpt</title>
</head>

<body>
    <input type="number" placeholder="Enter number1" id="num-1">
    <input type="number" placeholder="Enter number2" id="num-2">
    <button onclick="addition()">+</button>
    <h2 id="ans"></h2>

    <script>
        function addition() {
            let num1 = document.getElementById('num-1').value;
            let num2 = document.getElementById('num-2').value;

            let ans = parseInt(num1) + parseInt(num2);

            document.getElementById('ans').innerHTML ="Answer is : " + ans;
        }
    </script>
</body>

</html>
