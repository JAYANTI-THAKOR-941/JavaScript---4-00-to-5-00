<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmatic operator</title>
</head>
<body>
    
    <script>
        let num1 = 50;
        let num2 = 6;

        // arithmatic operator
        console.log(num1+num2)
        console.log(num1*num2)
        console.log(num1-num2)
        console.log(num1/num2)
        console.log(5**3)
      
    </script>
</body>
</html>
