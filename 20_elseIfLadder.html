<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Background</title>
    <style>
       body{
         height: 100vh;
       }
       .btn-group button{
            margin:20px;
            padding: 12px 24px;
            border: 0;
            border-radius: 5px;
            background-color: black;
            color: white;
       }
    </style>
</head>
<body>
    <div class="btn-group">
        <button onclick="changeBackground('color')">BgColor</button>
        <button onclick="changeBackground('gradiant')">BgGradiant</button>
        <button onclick="changeBackground('image')">BgImage</button>
    </div>

    <script>
        function changeBackground(type){
            if(type === 'color'){
                document.body.style.backgroundColor = "lightblue";
                document.body.style.backgroundImage = "none";
            }
            else if(type === 'gradiant'){
                document.body.style = "background:linear-gradient(rgba(254, 40, 40, 0.785),rgba(71, 222, 222, 0.895))"
            }
            else if(type === "image"){
                document.body.style = "background-image: url('https://images.pexels.com/photos/5208827/pexels-photo-5208827.jpeg')"

                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
            }
            else{
                alert("Invalid type.!!")
            }
        }
    </script>
</body>
</html>
