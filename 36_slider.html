<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider in JavaScript</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #slider{
            display: flex;
            width: 90%;
            align-items: center;
            margin: 2% auto;
        }

    </style>
</head>

<body>
    <div class="slider-container">
        <button id="prevBtn" class="prev"><i class="fa-solid fa-angle-left"></i></button>
        <div id="slider"></div>
        <button id="nextBtn" class="next"><i class="fa-solid fa-angle-right"></i></button>
    </div>

    <script>
        const heroSlides = [
            {
                id: 1,
                title: "Taste the Freshness in Every Bite",
                description:
                    "Experience chef-crafted dishes made with the freshest ingredients, delivering unforgettable flavors straight to your table.",
                buttonText: "Order Now",
                image: "https://media.istockphoto.com/id/1147252758/photo/healthy-vegetarian-food-background-vegetables-pesto-and-lentil-curry-with-tofu.jpg?s=612x612&w=0&k=20&c=tfLYLtT-f_I-tnmOdb_6WHRhIQa8jXy7SkFakC-P-LU=",
            },
            {
                id: 2,
                title: "Your Favorite Meals, Delivered Fast",
                description:
                    "Enjoy hot and delicious meals delivered to your doorstep with speed, quality, and care.",
                buttonText: "View Menu",
                image: "https://res.cloudinary.com/hz3gmuqw6/image/upload/c_fill,f_auto,h_400,q_60,w_600/v1/classpop/676136f4c8c7a.jpg",
            },
            {
                id: 3,
                title: "Exclusive Deals for Food Lovers",
                description:
                    "Discover daily specials, family combos, and limited-time offers crafted to satisfy every craving.",
                buttonText: "Explore Offers",
                image: "https://media.hellofresh.com/w_3840,q_auto,f_auto,c_limit,fl_lossy/hellofresh_website/se/cms/SEO/vegetarisk_matkasse.jpg",
            },
        ];

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const slider = document.getElementById('slider');

        let slideCount = 0;


        function displayContent() {
            slider.innerHTML = `
            <div class="slide-left">
                <h1>${heroSlides[slideCount].title}</h1>
                <p>${heroSlides[slideCount].description}</p>
                <button>${heroSlides[slideCount].buttonText}</button>
            </div>
            <div class="slide-right">
                <img src="${heroSlides[slideCount].image}" alt="">
            </div>
            `;
        }


        prevBtn.addEventListener('click',()=>{
            slideCount = slideCount-1;
            if(slideCount < heroSlides.length){
                slideCount = 0
            }
            displayContent();
        })

        
        nextBtn.addEventListener('click',()=>{
            slideCount = slideCount+1;
            if(slideCount > heroSlides.length){
                slideCount = 0
            }
            displayContent();
        })


        displayContent()
    </script>
</body>

</html>
